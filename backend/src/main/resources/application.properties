spring.application.name=backend

firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:secrets/cs308-c91e4-37fe1de6649e.json}
firebase.web-api-key=${FIREBASE_WEB_API_KEY:}

# Mail (SMTP) — configure via environment variables.
# For Gmail: use an App Password (https://myaccount.google.com/apppasswords).
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# Branding shown on invoices and outgoing emails
invoice.store.name=TechMind
invoice.store.email=${MAIL_FROM:${SMTP_USERNAME:no-reply@techmind.local}}
invoice.store.address=TechMind HQ, Istanbul, Turkey
invoice.store.website=techmind.example
